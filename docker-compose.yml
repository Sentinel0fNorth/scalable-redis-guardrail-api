
services:
  postgres:
    image: postgres:15-alpine
    container_name: assignment_postgres
    environment:
      POSTGRES_DB: assignment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assignment-network

  redis:
    image: redis:7-alpine
    container_name: assignment_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - assignment-network

  api:
    build: .
    container_name: assignment_api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/assignment_db
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - assignment-network

volumes:
  postgres_data:
  redis_data:

networks:
  assignment-network:
    driver: bridge
