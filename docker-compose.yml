version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: assignment_postgres
    environment:
      POSTGRES_DB: assignment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assignment-network

  redis:
    image: redis:7-alpine
    container_name: assignment_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - assignment-network

volumes:
  postgres_data:
  redis_data:

networks:
  assignment-network:
    driver: bridge
